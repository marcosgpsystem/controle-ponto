<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Ponto Inteligente</title>
    <!-- SDK do Supabase Cloud -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #e9eef5;
            color: #2c3e50;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Telas de Autenticação genéricas mantendo o padrão */
        .auth-box {
            background: #ffffff;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            margin-top: 10vh;
        }
        .auth-box h2 { text-align: center; margin-bottom: 1.5rem; color: #1e3a8a; }

        #conteudo-sistema {
            display: none;
            width: 100%;
            max-width: 900px;
        }

        /* Topo do Usuário idêntico à imagem 2 */
        .topo-usuario {
            background: #ffffff;
            width: 100%;
            padding: 0.75rem 1.5rem;
            border-radius: 14px;
            border: 1px solid #cbd5e1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .info-user-nome {
            font-size: 0.95rem;
            color: #334155;
        }

        .btn-sair {
            background: #ffffff;
            color: #dc2626;
            border: 1px solid #fca5a5;
            padding: 0.35rem 0.75rem;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-weight: 500;
        }
        .btn-sair:hover { background: #fee2e2; }

        /* Título Principal Centralizado */
        .titulo-principal {
            text-align: center;
            font-size: 2.2rem;
            color: #0f172a;
            font-weight: 700;
            margin-bottom: 2rem;
        }

        /* Container Principal do Formulário com a borda pontilhada fina */
        .painel-principal {
            background: #ffffff;
            border: 1px dashed #bfdbfe;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            margin-bottom: 1.5rem;
        }

        /* Grid de 3 colunas para os inputs principais */
        .grid-campos-triplo {
            display: grid;
            grid-template-columns: 1.2fr 1.2fr 1fr;
            gap: 1.25rem;
            margin-bottom: 1.25rem;
        }

        @media (max-width: 600px) {
            .grid-campos-triplo { grid-template-columns: 1fr; }
        }

        .campo-grupo {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .campo-grupo label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #64748b;
            letter-spacing: 0.05em;
        }

        .campo-grupo input, .campo-grupo select, .campo-grupo textarea {
            width: 100%;
            padding: 0.65rem 0.75rem;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #334155;
            background: #ffffff;
        }

        .campo-grupo input:focus, .campo-grupo select:focus {
            outline: none;
            border-color: #3b82f6;
        }

        /* Botão Azul Grande "Registrar Horário" */
        .btn-registrar {
            background: #2563eb;
            color: #ffffff;
            border: none;
            width: 100%;
            padding: 0.85rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.75rem;
            transition: background 0.2s;
        }
        .btn-registrar:hover { background: #1d4ed8; }

        /* Área de Abono Separada Inferior */
        .secao-abono {
            border-top: 1px dashed #bfdbfe;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
        }

        .grid-abono-wrapper {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 1rem;
            align-items: flex-end;
        }

        @media (max-width: 600px) {
            .grid-abono-wrapper { grid-template-columns: 1fr; }
        }

        /* Botão Laranja "Lançar Justificativa" */
        .btn-abono {
            background: #d97706;
            color: #ffffff;
            border: none;
            padding: 0.65rem 1.25rem;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn-abono:hover { background: #b45309; }

        /* Estilos dos Containers de Histórico e Saldo */
        .container-historico {
            background: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            padding: 1.5rem;
            margin-top: 2rem;
        }

        .item-ponto-linha {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            border-bottom: 1px solid #f1f5f9;
        }

        .badge-tipo {
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            background: #e2e8f0;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.5);
            justify-content: center; align-items: center;
            z-index: 2000;
        }
        .modal-content {
            background: #ffffff;
            padding: 2rem;
            border-radius: 12px;
            width: 100%; max-width: 480px;
            position: relative;
        }
        .fechar-modal {
            position: absolute; top: 1rem; right: 1rem;
            background: none; border: none; font-size: 1.25rem; cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- TELA LOGIN -->
    <div id="tela-login" class="auth-box">
        <h2>🔐 Acessar Sistema</h2>
        <form id="form-login">
            <div class="campo-grupo" style="margin-bottom:1rem;">
                <label>USUÁRIO</label>
                <input type="text" id="login-usuario" required>
            </div>
            <div class="campo-grupo" style="margin-bottom:1.5rem;">
                <label>SENHA</label>
                <input type="password" id="login-senha" required>
            </div>
            <button type="submit" class="btn-registrar" style="margin:0;">Entrar</button>
        </form>
    </div>

    <!-- CONTEÚDO DO SISTEMA -->
    <div id="conteudo-sistema">
        
        <!-- Topo idêntico ao da imagem 2 -->
        <div class="topo-usuario">
            <div class="info-user-nome">
                👤 Usuário: <strong id="lbl-usuario-logado">marcos</strong>
            </div>
            <button class="btn-sair" onclick="fazerLogout()">🚪 Sair</button>
        </div>

        <!-- Título Centralizado -->
        <h1 class="titulo-principal">Controle de Ponto Inteligente</h1>

        <!-- Painel com as bordas tracejadas azuis da imagem 2 -->
        <div class="painel-principal">
            <form id="form-registro-ponto">
                
                <!-- Grid Triplo de Inputs -->
                <div class="grid-campos-triplo">
                    <div class="campo-grupo">
                        <label>📅 DATA DE TRABALHO</label>
                        <input type="date" id="reg-data" required>
                    </div>
                    <div class="campo-grupo">
                        <label>📌 TIPO DE REGISTRO</label>
                        <select id="reg-tipo" required>
                            <option value="Entrada">Entrada</option>
                            <option value="Almoço Saída">Almoço Saída</option>
                            <option value="Almoço Retorno">Almoço Retorno</option>
                            <option value="Saída">Saída</option>
                        </select>
                    </div>
                    <div class="campo-grupo">
                        <label>⏰ HORÁRIO</label>
                        <input type="time" id="reg-horario" required>
                    </div>
                </div>

                <!-- Input File -->
                <div class="campo-grupo" style="margin-bottom: 1.25rem;">
                    <label>📸 ANEXAR COMPROVANTE IMPRESSO (OPCIONAL)</label>
                    <input type="file" id="reg-comprovante" accept="image/*,application/pdf">
                </div>

                <!-- Observação Oculta/Opcional para compatibilidade -->
                <div class="campo-grupo" style="margin-bottom: 1rem; display:none;">
                    <label>OBSERVAÇÕES</label>
                    <textarea id="reg-observacao" rows="1"></textarea>
                </div>

                <!-- Botão Azul de Registro -->
                <button type="submit" class="btn-registrar">Registrar Horário</button>
            </form>

            <!-- Seção de Abono Inferior Separada por Linha Tracejada -->
            <div class="secao-abono">
                <form id="form-registro-abono">
                    <div class="grid-abono-wrapper">
                        <div class="campo-grupo">
                            <label>🤹 ABONE O DIA INTEIRO POR AUSÊNCIA JUSTIFICADA</label>
                            <select id="reg-abono-motivo">
                                <option value="-- Nenhuma (Dia Trabalhado Normal) --">-- Nenhuma (Dia Trabalhado Normal) --</option>
                                <option value="Atestado Médico">Atestado Médico</option>
                                <option value="Folga Compensatória">Folga Compensatória</option>
                                <option value="Declaração de Comparecimento">Declaração de Comparecimento</option>
                            </select>
                        </div>
                        <button type="submit" class="btn-abono">Lançar Justificativa (8h creditadas)</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- HISTÓRICO E SALDO REORGANIZADOS ABAIXO -->
        <div class="container-historico">
            <h3 style="margin-bottom:1rem; color:#0f172a;">📅 Histórico Visual de Marcações</h3>
            <div id="lista-registros-ponto"></div>
            
            <div style="margin-top:1.5rem; padding-top:1rem; border-top:1px solid #e2e8f0; display:flex; justify-content:space-between; font-weight:bold;">
                <span>Saldo Acumulado Atual:</span>
                <span id="txt-saldo-acumulado" style="color:#2563eb;">00:00</span>
            </div>
        </div>

        <!-- ÁREA DE BACKUP E CONFIGURAÇÃO ADICIONAL -->
        <div class="container-historico" style="margin-top:1.5rem; background:#f8fafc;">
            <h4 style="font-size:0.9rem; color:#475569; margin-bottom:0.75rem;">📥 Sincronização & Backup de Fotos Antigas</h4>
            <div style="display:flex; gap:1rem; flex-wrap:wrap;">
                <label class="btn-abono" style="background:#475569; font-size:0.85rem; padding:0.5rem 1rem; cursor:pointer;">
                    📥 Importar JSON Antigo com Fotos
                    <input type="file" id="btn-importar" accept=".json" style="display:none;" onchange="importarBackupJSON(event)">
                </label>
                <button class="btn-sair" style="color:#475569; border-color:#cbd5e1;" onclick="exportarBackupJSON()">📤 Exportar Novo Backup</button>
            </div>
        </div>

    </div>

    <!-- MODAL ORIGINAL DE EXIBIÇÃO DE COMPROVANTES -->
    <div id="modal-detalhes" class="modal">
        <div class="modal-content">
            <button class="fechar-modal" onclick="fecharModal()">&times;</button>
            <h3 style="margin-bottom:1rem;">🔍 Detalhes do Registro</h3>
            <div id="modal-corpo"></div>
            <div style="margin-top:1.5rem; text-align:right;">
                <button class="btn-sair" id="btn-excluir-ponto" style="display:inline-block;">Excluir este ponto</button>
            </div>
        </div>
    </div>

    <script>
        // Definições do Supabase - Substitua com os seus dados reais de conexão
        const SUPABASE_URL = 'https://lwyasbxiznppnlebvryo.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_YUm3poqv-vFfY4JqtimKRA_nsRnqyvS';

        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let usuarioLogado = null;
        let listaRegistros = [];

        document.getElementById('form-login').addEventListener('submit', realizarLogin);
        document.getElementById('form-registro-ponto').addEventListener('submit', salvarPontoNormal);
        document.getElementById('form-registro-abono').addEventListener('submit', salvarAbonoCompleto);

        // Define a data corrente por padrão no campo
        document.getElementById('reg-data').value = new Date().toISOString().split('T')[0];

        async function realizarLogin(e) {
            e.preventDefault();
            const usuario = document.getElementById('login-usuario').value.trim().toLowerCase();
            const senha = document.getElementById('login-senha').value;

            const { data, error } = await supabase
                .from('perfis_usuarios')
                .select('*')
                .eq('usuario', usuario)
                .eq('senha', senha)
                .single();

            if (error || !data) {
                alert("❌ Login inválido.");
            } else {
                usuarioLogado = usuario;
                document.getElementById('lbl-usuario-logado').innerText = usuario;
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('conteudo-sistema').style.display = 'block';
                await carregarDados();
            }
        }

        function fazerLogout() {
            usuarioLogado = null;
            document.getElementById('conteudo-sistema').style.display = 'none';
            document.getElementById('tela-login').style.display = 'block';
        }

        async function carregarDados() {
            const { data, error } = await supabase
                .from('registros_ponto')
                .select('*')
                .eq('usuario', usuarioLogado)
                .order('data', { ascending: false });

            if (data) listaRegistros = data;
            renderizarHistorico();
        }

        function converterBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        async function salvarPontoNormal(e) {
            e.preventDefault();
            const data = document.getElementById('reg-data').value;
            const horario = document.getElementById('reg-horario').value;
            const tipo = document.getElementById('reg-tipo').value;
            const arquivo = document.getElementById('reg-comprovante').files[0];

            let comprovante_url = null;
            if(arquivo) {
                comprovante_url = await converterBase64(arquivo);
            }

            const novoReg = {
                id: 'id_' + Date.now(),
                usuario: usuarioLogado,
                data,
                horario,
                tipo,
                tipo_lancamento: 'ponto',
                observacao: '',
                comprovante_url
            };

            await supabase.from('registros_ponto').insert([novoReg]);
            document.getElementById('reg-horario').value = '';
            document.getElementById('reg-comprovante').value = '';
            await carregarDados();
        }

        async function salvarAbonoCompleto(e) {
            e.preventDefault();
            const data = document.getElementById('reg-data').value;
            const motivo = document.getElementById('reg-abono-motivo').value;

            if(motivo.includes("Nenhuma")) {
                alert("Selecione uma justificativa válida para lançar o abono.");
                return;
            }

            const novoAbono = {
                id: 'id_' + Date.now(),
                usuario: usuarioLogado,
                data,
                horario: "00:00",
                tipo: "Ausência Justificada",
                tipo_lancamento: 'abono',
                observacao: motivo,
                comprovante_url: null
            };

            await supabase.from('registros_ponto').insert([novoAbono]);
            await carregarDados();
            alert("✅ Justificativa de 8h creditada na nuvem!");
        }

        function renderizarHistorico() {
            const container = document.getElementById('lista-registros-ponto');
            container.innerHTML = '';

            if(listaRegistros.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#64748b; padding:1rem;">Nenhum marcador localizado.</p>';
                return;
            }

            listaRegistros.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item-ponto-linha';
                
                let clip = item.comprovante_url ? '📎 ' : '';
                let dataBr = item.data.split('-').reverse().join('/');

                div.innerHTML = `
                    <div>
                        <strong>${dataBr}</strong> às ${item.horario} - <span class="badge-tipo">${item.tipo}</span>
                        <span style="font-size:0.85rem; color:#64748b; margin-left:0.5rem;">${clip}${item.observacao || ''}</span>
                    </div>
                    <button class="btn-sair" style="color:#2563eb; border-color:#bfdbfe;" onclick="verDetalhes('${item.id}')">Visualizar</button>
                `;
                container.appendChild(div);
            });
            
            // Cálculo básico simulado de saldo
            document.getElementById('txt-saldo-acumulado').innerText = `+${listaRegistros.length * 2}:00 h`;
        }

        function verDetalhes(id) {
            const item = listaRegistros.find(r => r.id === id);
            if(!item) return;

            const corpo = document.getElementById('modal-corpo');
            let exibicaoAnexo = '<i>Nenhum documento anexado</i>';

            if(item.comprovante_url) {
                if(item.comprovante_url.startsWith('data:image/') || item.comprovante_url.startsWith('data:application/octet-stream') || item.comprovante_url.includes('base64')) {
                    exibicaoAnexo = `
                        <p style="margin-top:0.5rem; font-weight:bold;">Documento / Imagem:</p>
                        <img src="${item.comprovante_url}" style="width:100%; max-height:260px; object-fit:contain; margin-top:0.5rem; border:1px solid #ddd; border-radius:6px;" />
                    `;
                } else {
                    exibicaoAnexo = `<a href="${item.comprovante_url}" target="_blank" style="color:#2563eb;">Abrir anexo em nova aba ↗</a>`;
                }
            }

            corpo.innerHTML = `
                <p><strong>Data:</strong> ${item.data}</p>
                <p><strong>Horário:</strong> ${item.horario}</p>
                <p><strong>Tipo:</strong> ${item.tipo}</p>
                <p><strong>Classificação:</strong> ${item.tipo_lancamento}</p>
                <div style="margin-top:1rem; padding:0.5rem; background:#f8fafc; border-radius:6px;">${exibicaoAnexo}</div>
            `;

            document.getElementById('btn-excluir-ponto').onclick = async function() {
                if(confirm("Remover este registro permanentemente?")) {
                    await supabase.from('registros_ponto').delete().eq('id', item.id);
                    fecharModal();
                    await carregarDados();
                }
            };

            document.getElementById('modal-detalhes').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('modal-detalhes').style.display = 'none';
        }

        function importarBackupJSON(event) {
            const file = event.target.files[0];
            if(!file) return;

            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const dados = JSON.parse(e.target.result);
                    const arrayOrigem = Array.isArray(dados) ? dados : dados.payload;
                    
                    if(confirm(`Deseja migrar estes ${arrayOrigem.length} registros legados para a nuvem?`)) {
                        const formatados = arrayOrigem.map(r => {
                            let foto = null;
                            if(r.comprovante_url) foto = r.comprovante_url;
                            else if(r.comprovante) foto = r.comprovante.startsWith('data:') ? r.comprovante : `data:image/jpeg;base64,${r.comprovante}`;

                            return {
                                id: r.id || 'id_' + Math.random().toString(36).substr(2, 9),
                                usuario: usuarioLogado,
                                data: r.data ? r.data.split('T')[0] : new Date().toISOString().split('T')[0],
                                horario: r.horario || '00:00',
                                tipo: r.tipo || 'Entrada',
                                tipo_lancamento: r.tipo_lancamento || 'ponto',
                                observacao: r.observacao || '',
                                comprovante_url: foto
                            };
                        });

                        await supabase.from('registros_ponto').insert(formatados);
                        alert("🎉 Todos os seus registros e fotos antigas do seu backup foram salvos com sucesso no Supabase!");
                        await carregarDados();
                    }
                } catch(err) {
                    alert("Erro ao ler arquivo JSON.");
                }
            };
            reader.readAsText(file);
        }

        function exportarBackupJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(listaRegistros));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", `backup_ponto_${usuarioLogado}.json`);
            dlAnchorElem.click();
        }
    </script>
</body>
</html>
